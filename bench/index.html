<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calibration Bench</title>
<meta name="description" content="A metacognition trainer: predict your recall, retrieve from memory, grade strictly, then read a dual-needle gauge of predicted vs. actual. Reviews are spaced with an overconfidence penalty.">
<meta name="theme-color" content="#14181C">
<meta property="og:title" content="Calibration Bench">
<meta property="og:description" content="A metacognition trainer — predict, recall, grade, read the gauge.">
<meta property="og:url" content="https://mattbreckenridge.com/bench/">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2314181C'/%3E%3Cpath d='M6 22a10 10 0 0 1 20 0' fill='none' stroke='%23C9963F' stroke-width='2'/%3E%3Cline x1='16' y1='22' x2='22' y2='13' stroke='%23D64541' stroke-width='2' stroke-linecap='round'/%3E%3Ccircle cx='16' cy='22' r='2' fill='%23C9963F'/%3E%3C/svg%3E">
<style>
  html, body { margin: 0; background: #14181C; }
  #boot {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    color: #8A939B; font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
    font-size: 13px; letter-spacing: 0.15em;
  }
  #cb-footer {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    max-width: 920px; margin: 0 auto; padding: 14px 20px 30px;
    font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace; font-size: 12px;
    color: #8A939B; border-top: 1px solid #37424B;
  }
  #cb-footer a { color: #8A939B; text-decoration: none; }
  #cb-footer a:hover { color: #C9963F; }
  #cb-footer .cb-spacer { flex: 1; }
  #cb-footer .cb-note { color: #8A939B; }
  #cb-footer button {
    font-family: inherit; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase;
    background: transparent; color: #D8DCE0; border: 1.5px solid #37424B;
    border-radius: 3px; padding: 6px 12px; cursor: pointer;
  }
  #cb-footer button:hover { border-color: #C9963F; color: #C9963F; }
</style>
</head>
<body>
<div id="root"><div id="boot">ZEROING INSTRUMENT&hellip;</div></div>

<footer id="cb-footer">
  <a href="https://mattbreckenridge.com">&larr; mattbreckenridge.com</a>
  <span class="cb-spacer"></span>
  <span class="cb-note">Demo: data stays in this browser</span>
  <button id="cb-export" type="button">Export backup</button>
  <button id="cb-reset" type="button">Reset demo data</button>
</footer>

<!-- React, ReactDOM, Recharts as UMD globals -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js" crossorigin></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>

<!-- localStorage-backed window.storage + backup helpers (classic script) -->
<script src="storage-adapter.js?v=3"></script>
<!-- curated sample library, applied on first boot / demo reset -->
<script src="demo-library.js?v=1"></script>

<!-- In-browser JSX transpile (no build step) -->
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js" crossorigin></script>
<!-- The component script ends by mounting itself into #root -->
<script type="text/babel" data-presets="react" src="calibration-bench.jsx"></script>

<!-- Footer backup controls (plain JS; helpers live on window via the adapter) -->
<script>
  (function () {
    var $ = function (id) { return document.getElementById(id); };
    $("cb-export").onclick = function () { window.exportBackup(); };
    $("cb-reset").onclick = function () {
      if (!confirm("Reset the demo? This replaces everything here with the original sample library.")) return;
      localStorage.removeItem("calbench:calbench-v1");
      location.reload();
    };
  })();
</script>
</body>
</html>
